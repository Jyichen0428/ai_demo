<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数轴游戏</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #numberline {
            position: relative;
            width: 600px;
            height: 100px;
            margin: 50px auto;
            border-bottom: 2px solid #000;
        }
        #axis {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #000;
        }
        .tick {
            position: absolute;
            bottom: -10px;
            width: 1px;
            height: 10px;
            background-color: #000;
        }
        .label {
            position: absolute;
            bottom: -30px;
            font-size: 12px;
        }
        .point {
            position: absolute;
            bottom: 5px;
            width: 10px;
            height: 10px;
            background-color: red;
            border-radius: 50%;
            cursor: pointer;
        }
        #info {
            margin-top: 20px;
            font-size: 18px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>数轴游戏</h1>
    <p>点击数轴添加点，查看坐标。</p>
    <div id="numberline">
        <div id="axis"></div>
    </div>
    <div id="info">点击数轴添加点</div>
    <button onclick="clearPoints()">清除所有点</button>

    <script>
        const numberline = document.getElementById('numberline');
        const info = document.getElementById('info');
        const minValue = -10;
        const maxValue = 10;
        const width = 600;

        // Draw ticks and labels
        for (let i = minValue; i <= maxValue; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.left = ((i - minValue) / (maxValue - minValue)) * width + 'px';
            numberline.appendChild(tick);

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = i;
            label.style.left = ((i - minValue) / (maxValue - minValue)) * width - 5 + 'px';
            numberline.appendChild(label);
        }

        numberline.addEventListener('click', function(event) {
            const rect = numberline.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const value = minValue + (x / width) * (maxValue - minValue);
            const roundedValue = Math.round(value * 10) / 10; // round to 1 decimal

            const point = document.createElement('div');
            point.className = 'point';
            point.style.left = x - 5 + 'px';
            point.title = '坐标: ' + roundedValue;
            numberline.appendChild(point);

            info.textContent = '添加点坐标: ' + roundedValue;
        });

        function clearPoints() {
            const points = document.querySelectorAll('.point');
            points.forEach(point => point.remove());
            info.textContent = '点击数轴添加点';
        }
    </script>
</body>
</html>
