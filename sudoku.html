<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数独游戏</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #sudoku {
            margin: 20px auto;
            border-collapse: separate;
            border-spacing: 4px;
        }
        #sudoku td {
            width: 40px;
            height: 40px;
            border: 2px solid #000;
            text-align: center;
            font-size: 20px;
        }
        #sudoku .thick-border {
            border: 2px solid #000;
        }
        input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 20px;
            padding: 2px;
            box-sizing: border-box;
        }
        .num1 { background-color: #ffcccc; }
        .num2 { background-color: #ccffcc; }
        .num3 { background-color: #ccccff; }
        .num4 { background-color: #ffffcc; }
        .num5 { background-color: #ffccff; }
        .num6 { background-color: #ccffff; }
        .num7 { background-color: #ffcccc; }
        .num8 { background-color: #ccffcc; }
        .num9 { background-color: #ccccff; }
        #message {
            margin-top: 20px;
            font-size: 18px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
        #timer {
            font-size: 18px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>数独游戏</h1>
    <div>
        <label for="difficulty">难度：</label>
        <select id="difficulty">
            <option value="easy">简单</option>
            <option value="medium">中等</option>
            <option value="hard">困难</option>
        </select>
        <button onclick="newGame()">新游戏</button>
    </div>
    <div id="timer">时间：00:00</div>
    <table id="sudoku"></table>
    <div id="message"></div>
    <button onclick="checkSolution()">检查答案</button>
    <button onclick="resetGame()">重置游戏</button>
    <button onclick="hint()">提示</button>
    <button onclick="saveGame()">保存游戏</button>
    <button onclick="loadGame()">加载游戏</button>

    <script>
        const puzzles = [
            [
                [5, 3, 0, 0, 7, 0, 0, 0, 0],
                [6, 0, 0, 1, 9, 5, 0, 0, 0],
                [0, 9, 8, 0, 0, 0, 0, 6, 0],
                [8, 0, 0, 0, 6, 0, 0, 0, 3],
                [4, 0, 0, 8, 0, 3, 0, 0, 1],
                [7, 0, 0, 0, 2, 0, 0, 0, 6],
                [0, 6, 0, 0, 0, 0, 2, 8, 0],
                [0, 0, 0, 4, 1, 9, 0, 0, 5],
                [0, 0, 0, 0, 8, 0, 0, 7, 9]
            ],
            [
                [0, 0, 0, 2, 6, 0, 7, 0, 1],
                [6, 8, 0, 0, 7, 0, 0, 9, 0],
                [1, 9, 0, 0, 0, 4, 5, 0, 0],
                [8, 2, 0, 1, 0, 0, 0, 4, 0],
                [0, 0, 4, 6, 0, 2, 9, 0, 0],
                [0, 5, 0, 0, 0, 3, 0, 2, 8],
                [0, 0, 9, 3, 0, 0, 0, 7, 4],
                [0, 4, 0, 0, 5, 0, 0, 3, 6],
                [7, 0, 3, 0, 1, 8, 0, 0, 0]
            ],
            [
                [0, 2, 0, 6, 0, 8, 0, 0, 0],
                [5, 8, 0, 0, 0, 9, 7, 0, 0],
                [0, 0, 0, 0, 4, 0, 0, 0, 0],
                [3, 7, 0, 0, 0, 0, 5, 0, 0],
                [6, 0, 0, 0, 0, 0, 0, 0, 4],
                [0, 0, 8, 0, 0, 0, 0, 1, 3],
                [0, 0, 0, 0, 2, 0, 0, 0, 0],
                [0, 0, 9, 8, 0, 0, 0, 3, 6],
                [0, 0, 0, 3, 0, 6, 0, 9, 0]
            ]
        ];

        const solutions = [
            [
                [5, 3, 4, 6, 7, 8, 9, 1, 2],
                [6, 7, 2, 1, 9, 5, 3, 4, 8],
                [1, 9, 8, 3, 4, 2, 5, 6, 7],
                [8, 5, 9, 7, 6, 1, 4, 2, 3],
                [4, 2, 6, 8, 5, 3, 7, 9, 1],
                [7, 1, 3, 9, 2, 4, 8, 5, 6],
                [9, 6, 1, 5, 3, 7, 2, 8, 4],
                [2, 8, 7, 4, 1, 9, 6, 3, 5],
                [3, 4, 5, 2, 8, 6, 1, 7, 9]
            ],
            [
                [4, 3, 5, 2, 6, 9, 7, 8, 1],
                [6, 8, 2, 5, 7, 1, 4, 9, 3],
                [1, 9, 7, 8, 3, 4, 5, 6, 2],
                [8, 2, 6, 1, 9, 5, 3, 4, 7],
                [3, 7, 4, 6, 8, 2, 9, 1, 5],
                [9, 5, 1, 7, 4, 3, 6, 2, 8],
                [5, 1, 9, 3, 2, 6, 8, 7, 4],
                [2, 4, 8, 9, 5, 7, 1, 3, 6],
                [7, 6, 3, 4, 1, 8, 2, 5, 9]
            ],
            [
                [1, 2, 3, 6, 7, 8, 9, 4, 5],
                [5, 8, 4, 2, 3, 9, 7, 6, 1],
                [9, 6, 7, 1, 4, 5, 3, 2, 8],
                [3, 7, 2, 4, 6, 1, 5, 9, 8],
                [6, 9, 1, 5, 8, 3, 2, 7, 4],
                [4, 5, 8, 7, 9, 2, 6, 1, 3],
                [8, 3, 6, 9, 2, 4, 1, 5, 7],
                [2, 1, 9, 8, 5, 7, 4, 3, 6],
                [7, 4, 5, 3, 1, 6, 8, 9, 2]
            ]
        ];

        let currentPuzzleIndex = 0;
        let puzzle = puzzles[currentPuzzleIndex];
        let solution = solutions[currentPuzzleIndex];
        let startTime;
        let timerInterval;

        function generatePuzzle(difficulty, baseSolution) {
            const basePuzzle = baseSolution.map(row => [...row]);
            const removeCount = difficulty === 'easy' ? 30 : difficulty === 'medium' ? 45 : 55;
            const positions = [];
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    positions.push([i, j]);
                }
            }
            // Shuffle positions
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }
            // Remove cells
            for (let i = 0; i < removeCount; i++) {
                const [r, c] = positions[i];
                basePuzzle[r][c] = 0;
            }
            return basePuzzle;
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('timer').textContent = `时间：${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function createBoard() {
            const table = document.getElementById('sudoku');
            for (let i = 0; i < 9; i++) {
                const row = document.createElement('tr');
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('td');
                    if ((i % 3 === 0 && i !== 0) || (j % 3 === 0 && j !== 0)) {
                        cell.classList.add('thick-border');
                    }
                    if (puzzle[i][j] !== 0) {
                        cell.textContent = puzzle[i][j];
                        cell.classList.add('num' + puzzle[i][j]);
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.dataset.row = i;
                        input.dataset.col = j;
                        input.addEventListener('input', function() {
                            this.value = this.value.replace(/[^1-9]/g, '');
                            updateColor(this);
                        });
                        cell.appendChild(input);
                    }
                    row.appendChild(cell);
                }
                table.appendChild(row);
            }
        }

        function updateColor(input) {
            const value = parseInt(input.value) || 0;
            input.className = value ? 'num' + value : '';
        }

        function checkSolution() {
            const inputs = document.querySelectorAll('input');
            let correct = true;
            inputs.forEach(input => {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                const value = parseInt(input.value) || 0;
                if (value !== solution[row][col]) {
                    correct = false;
                    input.value = solution[row][col];
                    input.style.color = 'red';
                    updateColor(input);
                } else {
                    input.style.color = 'black';
                }
            });
            if (correct) {
                stopTimer();
                document.getElementById('message').textContent = '恭喜！答案正确！';
            } else {
                document.getElementById('message').textContent = '答案有误，已填充正确答案。错误的标记为红色。';
            }
        }

        function saveGame() {
            const inputs = document.querySelectorAll('input');
            const state = {};
            inputs.forEach(input => {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                state[`${row}-${col}`] = input.value;
            });
            localStorage.setItem('sudoku-puzzle', JSON.stringify(puzzle));
            localStorage.setItem('sudoku-solution', JSON.stringify(solution));
            localStorage.setItem('sudoku-state', JSON.stringify(state));
            localStorage.setItem('sudoku-time', startTime);
            document.getElementById('message').textContent = '游戏已保存。';
        }

        function loadGame() {
            const savedPuzzle = localStorage.getItem('sudoku-puzzle');
            const savedSolution = localStorage.getItem('sudoku-solution');
            const savedState = localStorage.getItem('sudoku-state');
            const savedTime = localStorage.getItem('sudoku-time');
            if (savedPuzzle && savedSolution && savedState) {
                puzzle = JSON.parse(savedPuzzle);
                solution = JSON.parse(savedSolution);
                const state = JSON.parse(savedState);
                startTime = savedTime ? parseInt(savedTime) : null;
                resetGame();
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    const row = parseInt(input.dataset.row);
                    const col = parseInt(input.dataset.col);
                    input.value = state[`${row}-${col}`] || '';
                    updateColor(input);
                });
                if (startTime) {
                    startTimer();
                }
                document.getElementById('message').textContent = '游戏已加载。';
            } else {
                document.getElementById('message').textContent = '没有保存的游戏。';
            }
        }

        function newGame() {
            const difficulty = document.getElementById('difficulty').value;
            solution = solutions[Math.floor(Math.random() * solutions.length)];
            puzzle = generatePuzzle(difficulty, solution);
            stopTimer();
            startTimer();
            resetGame();
        }

        function resetGame() {
            document.getElementById('sudoku').innerHTML = '';
            document.getElementById('message').textContent = '';
            createBoard();
        }

        function hint() {
            const inputs = document.querySelectorAll('input');
            for (let input of inputs) {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                const value = parseInt(input.value) || 0;
                if (value !== solution[row][col]) {
                    input.value = solution[row][col];
                    updateColor(input);
                    break;
                }
            }
        }

        // Initialize
        loadGame(); // Try to load saved game
        if (!startTime) {
            newGame(); // If no saved, start new
        }
    </script>
</body>
</html>
